<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILom Bot • Pair Code</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#050508;
  --surface:#111;
  --border:rgba(255,255,255,0.08);
  --text:#e8eaf0;
  --muted:rgba(232,234,240,0.4);
  --accent:#00ff88;
}

body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  overflow:hidden;
}

body.light{
  --bg:#f5f5f5;
  --surface:#fff;
  --text:#111;
  --muted:rgba(0,0,0,0.5);
}

/* BG */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(18px) brightness(.45);
  z-index:-2;
}

/* PARTICLES */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* TOGGLE */
.toggle{
  position:fixed;
  top:20px;
  right:20px;
}
.switch{
  width:50px;
  height:26px;
  background:#222;
  border-radius:50px;
  position:relative;
  cursor:pointer;
}
.switch::before{
  content:"";
  position:absolute;
  width:22px;
  height:22px;
  border-radius:50%;
  background:#00ff88;
  top:2px;
  left:2px;
  transition:.3s;
}
body.light .switch{background:#ccc}
body.light .switch::before{transform:translateX(24px)}

.wrapper{
  width:100%;
  max-width:400px;
  text-align:center;
}

/* HEADER */
.brand{
  font-size:2rem;
  font-weight:800;
}
.brand span{color:var(--accent)}

.sub{
  font-size:12px;
  color:var(--muted);
}

.inputBox{
  margin-top:20px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.inputBox img{
  width:24px;
}

.inputBox input{
  background:none;
  border:none;
  outline:none;
  color:var(--text);
  width:100%;
  font-size:15px;
}

/* BUTTON */
button{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* STATUS */
.status{
  margin-top:10px;
  font-size:13px;
}

/* CODE */
.codeBox{
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  background:var(--surface);
  border:1px solid var(--border);
}

.copyBtn{
  margin-top:10px;
  padding:8px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#00ff88;
  cursor:pointer;
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:11px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<canvas id="canvas"></canvas>

<div class="toggle" onclick="document.body.classList.toggle('light')">
  <div class="switch"></div>
</div>

<div class="wrapper">

<div class="brand">ILom<span>Bot</span></div>
<div class="sub">Enter your WhatsApp number</div>

<div class="inputBox">
  <img id="flag" src="https://flagcdn.com/w40/un.png">
  <input id="number" placeholder="234812..." oninput="updateFlag()">
</div>

<button onclick="getCode()">Get Pairing Code</button>

<div class="status" id="status"></div>
<div id="code-area"></div>

<div class="footer">
NexusCoders • made with love
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

<script>
// FLAG DETECT (BASED ON COUNTRY CODE)
function updateFlag(){
  const num = document.getElementById('number').value;

  if(num.startsWith("234")){
    document.getElementById('flag').src = "https://flagcdn.com/w40/ng.png";
  }else if(num.startsWith("1")){
    document.getElementById('flag').src = "https://flagcdn.com/w40/us.png";
  }else if(num.startsWith("44")){
    document.getElementById('flag').src = "https://flagcdn.com/w40/gb.png";
  }else{
    document.getElementById('flag').src = "https://flagcdn.com/w40/un.png";
  }
}

// MAIN FUNCTION
async function getCode(){
  const num = document.getElementById('number').value.replace(/[^0-9]/g,'');
  const status = document.getElementById('status');
  const area = document.getElementById('code-area');

  if(!num){
    status.innerHTML = "❌ Enter number";
    return;
  }

  status.innerHTML = "⏳ Generating...";
  area.innerHTML = "";

  try{
    const res = await axios(`/code?number=${num}`);
    const code = res.data.code;

    status.innerHTML = "";

    area.innerHTML = `
      <div class="codeBox">
        <div style="font-size:18px;">${code}</div>
        <button class="copyBtn" onclick="navigator.clipboard.writeText('${code}')">Copy</button>
      </div>
    `;

    navigator.clipboard.writeText(code);

  }catch{
    status.innerHTML = "❌ Failed";
  }
}

// WAIFU BG
const bg = document.getElementById("bg");
async function changeBg(){
  try{
    const res = await fetch("https://api.waifu.pics/sfw/waifu");
    const data = await res.json();
    bg.style.backgroundImage = `url(${data.url})`;
  }catch{}
}
setInterval(changeBg,5000);
changeBg();

// PARTICLES
const c = document.getElementById("canvas");
const ctx = c.getContext("2d");
let w,h,parts=[];

function resize(){
  w=c.width=innerWidth;
  h=c.height=innerHeight;
}
resize();
window.onresize=resize;

for(let i=0;i<60;i++){
  parts.push({x:Math.random()*w,y:Math.random()*h,vx:Math.random()-0.5,vy:Math.random()-0.5});
}

function draw(){
  ctx.clearRect(0,0,w,h);
  parts.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x<0||p.x>w)p.vx*=-1;
    if(p.y<0||p.y>h)p.vy*=-1;
    ctx.fillStyle="rgba(0,255,136,0.5)";
    ctx.fillRect(p.x,p.y,2,2);
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
