<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilom Bot Pair</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#eef2f7;
  --card:#ffffff;
  --text:#111;
  --muted:#666;
  --primary:#3b82f6;
}

.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#fff;
  --muted:#94a3b8;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg) center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition:background 0.8s ease;
}

.container{
  width:340px;
  background:var(--card);
  border-radius:25px;
  padding:30px 20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  backdrop-filter:blur(8px);
}

.icon{
  width:80px;
  height:80px;
  margin:auto;
  border-radius:20px;
  background:linear-gradient(135deg,#22c1c3,#3b82f6);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:30px;
}

h2{
  margin:15px 0 5px;
  color:var(--text);
}

p{
  color:var(--muted);
  font-size:14px;
}

.input{
  margin-top:20px;
  display:flex;
  align-items:center;
  background:#f1f5f9;
  border-radius:12px;
  padding:10px;
}

.dark .input{
  background:#334155;
}

.input span{
  margin-right:5px;
  color:var(--muted);
}

.input input{
  border:none;
  outline:none;
  background:none;
  width:100%;
  font-size:16px;
  color:var(--text);
}

button{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c1c3,#3b82f6);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  opacity:0.9;
}

.status{
  margin-top:15px;
  font-size:14px;
}

.spinner{
  border:3px solid #ccc;
  border-top:3px solid var(--primary);
  border-radius:50%;
  width:18px;
  height:18px;
  animation:spin 1s linear infinite;
  display:inline-block;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.codeBox{
  margin-top:20px;
  padding:15px;
  background:#e0f2fe;
  border-radius:12px;
}

.dark .codeBox{
  background:#1e3a8a;
}

.copyBtn{
  margin-top:10px;
  padding:8px;
  width:100%;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#10b981;
  color:white;
}

.toggle{
  position:absolute;
  top:15px;
  right:15px;
  cursor:pointer;
  font-size:26px;
  transition:0.4s;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🔄</div>

<div class="container">
  <div class="icon">🤖</div>
  <h2>Ilom Bot Pair</h2>
  <p>Enter your WhatsApp number</p>

  <div class="input">
    <span id="cc">+</span>
    <input id="number" placeholder="234812..." />
  </div>

  <button onclick="getCode()">Get Pairing Code</button>

  <div class="status" id="status"></div>
  <div id="code-area"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

<script>
let darkMode = false;

// Theme Toggle
function toggleTheme(){
  document.body.classList.toggle('dark');
  darkMode = !darkMode;
  document.querySelector(".toggle").innerText = darkMode ? "☀️" : "🌙";
}

// Auto Country Code
fetch('https://ipapi.co/json/')
.then(res=>res.json())
.then(data=>{
  document.getElementById('cc').innerText = '+' + data.country_calling_code.replace('+','');
});

// Copy Code
function copyCode(val){
  navigator.clipboard.writeText(val);
  alert("Copied!");
}

// Main Pair Code
async function getCode(){
  const num = document.getElementById('number').value.replace(/[^0-9]/g,'');
  const status = document.getElementById('status');
  const area = document.getElementById('code-area');

  if(!num){
    status.innerHTML = "❌ Enter number";
    return;
  }

  status.innerHTML = '<span class="spinner"></span> Generating...';
  area.innerHTML = "";

  try{
    const res = await axios(`/code?number=${num}`);
    const code = res.data.code;

    status.innerHTML = "";

    area.innerHTML = `
      <div class="codeBox">
        <div style="font-size:20px;word-break:break-all;">${code}</div>
        <button class="copyBtn" onclick="copyCode('${code}')">Copy</button>
      </div>
    `;

    navigator.clipboard.writeText(code);

  }catch{
    status.innerHTML = "❌ Failed to generate";
  }
}

// Waifu API Background Change
async function setWaifuBG(){
  try{
    const res = await fetch("https://api.waifu.pics/sfw/waifu");
    const data = await res.json();
    document.body.style.backgroundImage = `url(${data.url})`;
  }catch(err){
    console.error("BG Load Error:", err);
  }
}
setWaifuBG();
setInterval(setWaifuBG, 5000);

</script>

</body>
</html>
