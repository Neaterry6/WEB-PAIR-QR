<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILom Bot • WhatsApp Session</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#050508;
  --surface:#111;
  --border:rgba(255,255,255,0.08);
  --text:#e8eaf0;
  --muted:rgba(232,234,240,0.4);
  --accent:#00ff88;
}

body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  overflow:hidden;
}

body.light{
  --bg:#f5f5f5;
  --surface:#fff;
  --text:#111;
  --muted:rgba(0,0,0,0.5);
}

.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(20px) brightness(0.4);
  z-index:-2;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

.toggle{
  position:fixed;
  top:20px;
  right:20px;
  width:44px;
  height:44px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:18px;
}

.wrapper{
  max-width:700px;
  text-align:center;
}

.brand-name{
  font-size:3rem;
  font-weight:800;
}
.brand-name span{color:var(--accent)}

.brand-sub{
  font-size:12px;
  color:var(--muted);
  letter-spacing:2px;
}

.bot-img{
  width:140px;
  border-radius:14px;
  margin-top:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:25px;
}

.social{grid-template-columns:repeat(3,1fr)}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-3px);
}

.card img{
  width:26px;
  height:26px;
}

.card h3{
  font-size:14px;
}

.card p{
  font-size:11px;
  color:var(--muted);
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:var(--muted);
}

a{text-decoration:none;color:inherit}

@media(max-width:520px){
  .grid,.social{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<canvas id="canvas"></canvas>

<div class="toggle" onclick="document.body.classList.toggle('light')">
⚡
</div>

<div class="wrapper">

<div class="brand-name">ILom<span>Bot</span></div>
<div class="brand-sub">WhatsApp Bot Platform</div>

<img src="https://files.catbox.moe/ne3i3i.jpeg" class="bot-img">

<div class="grid">
<a class="card" onclick="window.open('/qrpage')">
<img src="https://img.icons8.com/fluency/48/qr-code.png">
<div>
<h3>QR Code</h3>
<p>Scan to link device</p>
</div>
</a>

<a class="card" onclick="window.open('/pair')">
<img src="https://img.icons8.com/fluency/48/link.png">
<div>
<h3>Pair Code</h3>
<p>Link via number</p>
</div>
</a>
</div>

<div class="grid social">

<a class="card" href="https://github.com/GlobalTechInfo/WEB-PAIR-QR" target="_blank">
<img src="https://img.icons8.com/ios-filled/50/github.png">
<div>
<h3>GitHub</h3>
<p>Source & releases</p>
</div>
</a>

<a class="card" href="https://whatsapp.com/channel/0029VagJIAr3bbVBCpEkAM07" target="_blank">
<img src="https://img.icons8.com/color/48/whatsapp.png">
<div>
<h3>WhatsApp</h3>
<p>Join channel</p>
</div>
</a>

<a class="card" href="https://t.me/Global_TechInfo" target="_blank">
<img src="https://img.icons8.com/color/48/telegram-app.png">
<div>
<h3>Telegram</h3>
<p>Support group</p>
</div>
</a>

</div>

<div class="footer">
NexusCoders • made with love
</div>

</div>

<script>
// WAIFU BG
const bg = document.getElementById("bg");
async function changeBg(){
  try{
    const res = await fetch("https://api.waifu.pics/sfw/waifu");
    const data = await res.json();
    bg.style.backgroundImage = `url(${data.url})`;
  }catch{}
}
setInterval(changeBg,5000);
changeBg();

// PARTICLES
const c = document.getElementById("canvas");
const ctx = c.getContext("2d");
let w,h,parts=[];

function resize(){
  w=c.width=innerWidth;
  h=c.height=innerHeight;
}
resize();
window.onresize=resize;

for(let i=0;i<60;i++){
  parts.push({x:Math.random()*w,y:Math.random()*h,vx:Math.random()-0.5,vy:Math.random()-0.5});
}

function draw(){
  ctx.clearRect(0,0,w,h);
  parts.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x<0||p.x>w)p.vx*=-1;
    if(p.y<0||p.y>h)p.vy*=-1;
    ctx.fillStyle="rgba(0,255,136,0.4)";
    ctx.fillRect(p.x,p.y,2,2);
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
